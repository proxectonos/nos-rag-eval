general_config:
  hf_cache_dir: /home/compartido/pabloF/cache

database: 
  chunk_size: 2000
  chunk_overlap: 200
  elastic_index: praza_qwen_bge-m3_chunked
  elastic_config_file: /home/compartido/pabloF/nos-rag-eval/elasticsearch/config_elastic.yaml

retriever:
  embedding_model: BAAI/bge-m3  # Embedding model to use
  retrieval_strategy: BM25  # Retrieval strategy to use [BM25, SIMILARITY, DEFAULT]
  initial_retrieve_count: 5 # Number of initial results to retrieve before re-ranking
  query_top_k: 3  # Number of top results to return for a query 

reranker:
  use_reranking: true
  reranker_model: BAAI/bge-reranker-v2-m3
  
    


  